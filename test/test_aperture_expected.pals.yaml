PALS:
  version: null
  notes:
    - "This file was generated by the `scibmad_to_pals()` function."
    - "Elements that have no `TrackingP` dictionary have `SciBmadStandard` as their tracking method with all parameters equal to false."
  extension_names:
    names:
      - SciBmad
    prefixes:
      - SciBmad_
  facility:
    - t:
        kind: Drift
        length: 0.25
        ApertureP:
          x_min: 0.0
          x_max: 0.0
          y_min: 0.0
          y_max: 1.0
          aperture_shifts_with_body: true
    - beamline1:
        kind: Beamline
        line:
          - t
    - lattice:
        kind: Lattice
        branches:
          - beamline1
    - use: lattice
